services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dripsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dripsense}
      POSTGRES_DB: ${POSTGRES_DB:-dripsense}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/server/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dripsense} -d ${POSTGRES_DB:-dripsense}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  server:
    build:
      context: ./apps/server
      target: development
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./apps/server:/app
      - /app/node_modules

  web:
    build:
      context: ./apps/web
      target: development
    env_file: .env
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@dripsense.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - web
      - server

volumes:
  pgdata:
